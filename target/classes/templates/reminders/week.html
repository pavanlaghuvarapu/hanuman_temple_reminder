<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Week ' + ${weekNumber} + ' | Hanuman Temple'">Week Reminders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/temple.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg temple-navbar fixed-top">
    <div class="container-fluid px-3">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="temple-logo">🚩</span>
            <div><div class="brand-title">Hanuman Temple</div><div class="brand-subtitle">Puja Reminder System</div></div>
        </a>
    </div>
</nav>
<div class="page-wrapper">
    <aside class="sidebar d-none d-lg-flex flex-column"><div th:replace="~{fragments/sidebar :: sidebar-nav}"></div></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="container-fluid">
                <h1 class="page-title"><i class="bi bi-calendar-week-fill me-2 text-warning"></i>Week <span th:text="${weekNumber}"></span> Reminders</h1>
            </div>
        </div>
        <div class="content-body">
            <div th:if="${couples != null and !couples.isEmpty()}" class="row g-4">
                <div th:each="couple : ${couples}" class="col-md-6">
                    <div class="temple-card">
                        <div class="temple-card-body">
                            <h5 th:text="${couple.husbandName} + ' & ' + ${couple.wifeName}"></h5>
                            <p class="text-muted"><i class="bi bi-phone-fill me-1"></i><span th:text="${couple.mobileNumber}"></span></p>
                            <a th:href="@{/reminders/preview/{id}(id=${couple.id})}" class="btn btn-whatsapp btn-sm"><i class="bi bi-whatsapp me-1"></i>Send Reminder</a>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${couples == null or couples.isEmpty()}" class="temple-card">
                <div class="temple-card-body text-center py-5">
                    <i class="bi bi-calendar-x text-warning fs-1"></i>
                    <p class="mt-3 text-muted">No couples assigned to Week <strong th:text="${weekNumber}"></strong></p>
                    <a th:href="@{/couples/add}" class="btn btn-warning">Add Couple</a>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
