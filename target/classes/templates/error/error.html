<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Hanuman Temple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/temple.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg temple-navbar fixed-top">
    <div class="container-fluid px-3">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="temple-logo">🚩</span>
            <div><div class="brand-title">Hanuman Temple</div><div class="brand-subtitle">Puja Reminder System</div></div>
        </a>
    </div>
</nav>
<div class="page-wrapper">
    <main class="main-content" style="margin-left:0">
        <div class="content-body d-flex align-items-center justify-content-center" style="min-height:80vh">
            <div class="text-center">
                <div class="error-code" th:text="${errorCode}">Error</div>
                <h2 class="mb-3" th:text="${errorTitle}">Something went wrong</h2>
                <p class="text-muted mb-4" th:text="${errorMessage}">An error occurred.</p>
                <div class="d-flex gap-3 justify-content-center">
                    <a th:href="@{/}" class="btn btn-warning"><i class="bi bi-house-fill me-1"></i>Dashboard</a>
                    <button onclick="history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Go Back</button>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
