<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Details | Hanuman Temple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/temple.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg temple-navbar fixed-top">
    <div class="container-fluid px-3">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="temple-logo">🚩</span>
            <div><div class="brand-title">Hanuman Temple</div><div class="brand-subtitle">Puja Reminder System</div></div>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
            <i class="bi bi-list text-white fs-4"></i>
        </button>
    </div>
</nav>
<div class="offcanvas offcanvas-start temple-sidebar-offcanvas" tabindex="-1" id="sidebarOffcanvas">
    <div class="offcanvas-header"><h5 class="offcanvas-title text-white">🚩 Navigation</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body p-0"><div th:replace="~{fragments/sidebar :: sidebar-nav}"></div></div>
</div>
<div class="page-wrapper">
    <aside class="sidebar d-none d-lg-flex flex-column"><div th:replace="~{fragments/sidebar :: sidebar-nav}"></div></aside>
    <main class="main-content">
        <div class="page-header">
            <div class="container-fluid">
                <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                    <div>
                        <h1 class="page-title"><i class="bi bi-person-lines-fill me-2 text-warning"></i>Couple Details</h1>
                        <nav aria-label="breadcrumb"><ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/}" class="text-warning">Home</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/couples}" class="text-warning">Couples</a></li>
                            <li class="breadcrumb-item active text-muted">Details</li>
                        </ol></nav>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/couples/edit/{id}(id=${couple.id})}" class="btn btn-warning"><i class="bi bi-pencil-fill me-1"></i>Edit</a>
                        <a th:href="@{/couples}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
                    </div>
                </div>
            </div>
        </div>
        <div class="content-body">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <div class="temple-card mb-4">
                        <div class="temple-card-body text-center py-5">
                            <div class="couple-profile-icon mb-3"><i class="bi bi-people-fill"></i></div>
                            <h3 class="mb-1">
                                <span th:text="${couple.husbandName}"></span>
                                <span class="text-muted mx-2">&amp;</span>
                                <span th:text="${couple.wifeName}"></span>
                            </h3>
                            <span class="badge badge-week fs-6 px-3 py-2 mt-2">Week <span th:text="${couple.weekNumber}"></span></span>
                        </div>
                    </div>
                    <div class="temple-card">
                        <div class="temple-card-header"><h5 class="mb-0"><i class="bi bi-info-circle-fill text-warning me-2"></i>Details</h5></div>
                        <div class="temple-card-body">
                            <div class="detail-row">
                                <div class="detail-label"><i class="bi bi-person-fill text-warning me-2"></i>Husband Name</div>
                                <div class="detail-value" th:text="${couple.husbandName}"></div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label"><i class="bi bi-person-fill me-2" style="color:#f778ba"></i>Wife Name</div>
                                <div class="detail-value" th:text="${couple.wifeName}"></div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label"><i class="bi bi-phone-fill text-success me-2"></i>Mobile Number</div>
                                <div class="detail-value">
                                    <i class="bi bi-whatsapp text-success me-1"></i>
                                    <span th:text="${couple.mobileNumber}"></span>
                                </div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label"><i class="bi bi-calendar-week-fill text-info me-2"></i>Assigned Week</div>
                                <div class="detail-value"><span class="badge badge-week" th:text="'Week ' + ${couple.weekNumber}"></span></div>
                            </div>
                            <div class="detail-row border-0">
                                <div class="detail-label"><i class="bi bi-clock-fill text-muted me-2"></i>Registered On</div>
                                <div class="detail-value text-muted" th:text="${#temporals.format(couple.createdAt, 'dd MMMM yyyy, hh:mm a')}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <a th:href="@{/reminders/preview/{id}(id=${couple.id})}" class="btn btn-whatsapp flex-grow-1">
                            <i class="bi bi-whatsapp me-2"></i>Send WhatsApp Reminder
                        </a>
                        <a th:href="@{/couples/edit/{id}(id=${couple.id})}" class="btn btn-warning flex-grow-1">
                            <i class="bi bi-pencil-fill me-1"></i>Edit Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/temple.js}"></script>
</body>
</html>
